<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GutGroove</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 40px; width: 420px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 24px; margin-bottom: 4px; }
    p.sub { color: #888; font-size: 14px; margin-bottom: 32px; }
    .upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: border-color 0.2s; }
    .upload-area:hover { border-color: #666; }
    .upload-area input { display: none; }
    .upload-area label { cursor: pointer; font-size: 14px; color: #555; }
    .filename { font-size: 13px; color: #333; margin-top: 8px; }
    button { width: 100%; padding: 14px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; }
    button:hover { background: #333; }
    .result { margin-top: 28px; padding: 20px; border-radius: 12px; display: none; }
    .result.normal { background: #e8f5e9; }
    .result.abnormal { background: #fdecea; }
    .result h2 { font-size: 18px; margin-bottom: 8px; }
    .result .score { font-size: 48px; font-weight: 600; margin: 8px 0; }
    .result .label { font-size: 13px; color: #555; }
    .loading { text-align: center; color: #888; font-size: 14px; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>GutGroove</h1>
    <p class="sub">Upload a bowel sound recording to analyse gut motility</p>

    <div class="upload-area">
      <input type="file" id="fileInput" accept=".wav" onchange="showFilename(this)">
      <label for="fileInput">Click to upload a .wav file</label>
      <div class="filename" id="filename"></div>
    </div>

    <button onclick="analyse()">Analyse</button>
    <div class="loading" id="loading">Analysing...</div>

    <div class="result" id="result">
      <h2>Gut motility result</h2>
      <div class="score" id="score"></div>
      <div class="label" id="resultLabel"></div>
      <div class="label" id="status"></div>
    </div>
  </div>

  <script>
    function showFilename(input) {
      document.getElementById('filename').textContent = input.files[0]?.name || '';
    }

    async function analyse() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) { alert('Please upload a .wav file first'); return; }

      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';

      const formData = new FormData();
      formData.append('file', file);

      const res = await fetch('/predict', { method: 'POST', body: formData });
      const data = await res.json();

      document.getElementById('loading').style.display = 'none';
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.className = `result ${data.status}`;
      document.getElementById('score').textContent = `${data.ir_estimate} /min`;
      document.getElementById('resultLabel').textContent = `Detection: ${data.label} (p=${data.probability})`;
      document.getElementById('status').textContent = `Status: ${data.status} — normal range is 5–30 events/min`;
    }
  </script>
</body>
</html>
